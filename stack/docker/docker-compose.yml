version: "3.8"

services:

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.0
    container_name: es_pfe
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - elk_net
    healthcheck:
      test: ["CMD-SHELL", "curl -su elastic:${ELASTIC_PASSWORD:-changeme} http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 30s
      timeout: 10s
      retries: 5

  kibana:
    image: docker.elastic.co/kibana/kibana:9.3.0
    container_name: kibana_pfe
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_SYSTEM_PASSWORD:-changeme2}
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - elk_net

  logstash:
    image: docker.elastic.co/logstash/logstash:9.3.0
    container_name: logstash_pfe
    volumes:
      - ../elk/logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}
    ports:
      - "5001:5001/tcp"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - elk_net

  ollama:
    image: ollama/ollama:latest
    container_name: ollama_pfe
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - elk_net

  chromadb:
    image: chromadb/chroma:latest
    container_name: chroma_pfe
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - elk_net

volumes:
  es_data:
  ollama_data:
  chroma_data:

networks:
  elk_net:
    driver: bridge
