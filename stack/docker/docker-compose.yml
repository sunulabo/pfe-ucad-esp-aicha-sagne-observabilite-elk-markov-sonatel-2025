networks:
  elk-net:
    driver: bridge

volumes:
  esdata01:
    driver: local
  kibanadata:
    driver: local

services:

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_VERSION}
    container_name: elasticsearch
    hostname: elasticsearch
    environment:
      - node.name=elasticsearch
      - cluster.name=${CLUSTER_NAME}
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - xpack.ml.enabled=true
      - node.roles=master,data,ingest,ml,remote_cluster_client
      - bootstrap.memory_lock=true
      - ES_JAVA_OPTS=${ES_JAVA_OPTS}
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - esdata01:/usr/share/elasticsearch/data
      - ./elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    ports:
      - "${ES_PORT}:9200"
      - "9300:9300"
    networks:
      - elk-net
    restart: unless-stopped
    healthcheck:
      test: >
        curl -s -u elastic:${ELASTIC_PASSWORD}
        http://localhost:9200/_cluster/health
        | grep -qE '"status":"(green|yellow)"'
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 60s

  kibana:
    image: docker.elastic.co/kibana/kibana:${ELASTIC_VERSION}
    container_name: kibana
    hostname: kibana
    environment:
      - SERVERNAME=kibana-uadb
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD}
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=uadb2025kibanaencryptionkey32chars
      - MONITORING_ENABLED=true
      - ELASTICSEARCH_SERVICEACCOUNTTOKEN=
    volumes:
      - kibanadata:/usr/share/kibana/data
      - ./kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    ports:
      - "${KIBANA_PORT}:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - elk-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5601/api/status | grep -q 'available'"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 90s

  logstash:
    image: docker.elastic.co/logstash/logstash:${ELASTIC_VERSION}
    container_name: logstash
    hostname: logstash
    environment:
      - LS_JAVA_OPTS=${LS_JAVA_OPTS}
      - ELASTIC_USER=elastic
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - ELASTIC_HOSTS=http://elasticsearch:9200
      - xpack.monitoring.enabled=true
      - xpack.monitoring.elasticsearch.hosts=http://elasticsearch:9200
      - xpack.monitoring.elasticsearch.username=elastic
      - xpack.monitoring.elasticsearch.password=${ELASTIC_PASSWORD}
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:rw
      - ./data/sample-logs:/data/sample-logs:ro
    ports:
      - "${LOGSTASH_TCP_PORT}:5000/tcp"
      - "${LOGSTASH_BEATS_PORT}:5044"
      - "${LOGSTASH_API_PORT}:9600"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - elk-net
    restart: unless-stopped

  setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_VERSION}
    container_name: elk-setup
    volumes:
      - ./setup-scripts/setup.sh:/setup.sh:ro
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - KIBANA_PASSWORD=${KIBANA_PASSWORD}
    command: bash /setup.sh
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - elk-net
    restart: "no"