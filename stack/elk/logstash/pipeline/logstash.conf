# ============================================================
#  logstash.conf — Pipeline UADB Lab
#  Supporte : JSON TCP, Beats, fichiers CSV/log locaux
#  Use cases ML : logs réseau, métriques, anomalies télécom
# ============================================================

input {

  # ── Entrée 1 : injection TCP JSON (scripts Python des étudiants) ──
  tcp {
    port  => 5000
    codec => json_lines
    tags  => ["tcp-input"]
  }

  # ── Entrée 2 : Filebeat / Metricbeat ──────────────────────────────
  beats {
    port => 5044
    tags => ["beats-input"]
  }

  # ── Entrée 3 : Fichiers CSV locaux (datasets lab étudiants) ───────
  file {
    path           => "/data/sample-logs/*.log"
    start_position => "beginning"
    sincedb_path   => "/dev/null"
    codec          => "plain"
    tags           => ["file-input"]
  }

}

# ──────────────────────────────────────────────────────────────────────
filter {

  # ── Parse JSON si le message est du JSON brut ─────────────────────
  if [message] =~ /^\s*\{/ {
    json {
      source => "message"
    }
  }

  # ── Parse CSV (format : timestamp,metric_name,value,host) ─────────
  if "file-input" in [tags] {
    csv {
      separator => ","
      columns   => ["timestamp", "metric_name", "value", "host"]
    }
    mutate {
      convert => {
        "value" => "float"
      }
    }
  }

  # ── Normalisation de la date ───────────────────────────────────────
  if [timestamp] {
    date {
      match  => ["timestamp",
                 "yyyy-MM-dd HH:mm:ss",
                 "yyyy-MM-dd'T'HH:mm:ss.SSSZ",
                 "ISO8601",
                 "dd/MMM/yyyy:HH:mm:ss Z"]
      target => "@timestamp"
      remove_field => ["timestamp"]
    }
  }

  # ── Enrichissement géo (si IP présente) ───────────────────────────
  if [client_ip] {
    geoip {
      source => "client_ip"
      target => "geoip"
    }
  }

  # ── Suppression des champs inutiles ───────────────────────────────
  mutate {
    remove_field => ["agent", "ecs", "input", "log"]
    add_field    => {
      "lab_source" => "uadb-master2-bigdata"
      "env"        => "lab"
    }
  }

}

# ──────────────────────────────────────────────────────────────────────
output {

  # ── Vers Elasticsearch (index quotidien) ──────────────────────────
  elasticsearch {
    hosts    => ["http://elasticsearch:9200"]
    user     => "elastic"
    password => "${ELASTIC_PASSWORD}"
    index    => "uadb-lab-%{[env]}-%{+YYYY.MM.dd}"

    # ILM policy pour rotation automatique
    ilm_enabled           => true
    ilm_rollover_alias    => "uadb-lab"
    ilm_pattern           => "000001"
    ilm_policy            => "uadb-lab-policy"
  }

  # ── Debug console (commenter en production) ───────────────────────
  stdout {
    codec => rubydebug
  }

}
